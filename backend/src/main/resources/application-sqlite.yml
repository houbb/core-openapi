spring:
  datasource:
    url: jdbc:sqlite:./data/core-openapi.db
    driver-class-name: org.sqlite.JDBC

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Flyway community doesn't support SQLite natively, but sqlite-jdbc works as a JDBC driver
    # Disable if it causes issues, or configure for clean start
    baseline-on-migrate: true
    clean-disabled: true

mybatis-plus:
  configuration:
    # SQLite doesn't support batch updates by default
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
