server:
  port: ${SERVER_PORT:8107}

spring:
  application:
    name: core-openapi
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:sqlite}

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# App info
info:
  app:
    name: core-openapi
    description: API Foundation Runtime — API Catalog for Core Platform

# Gateway config
gateway:
  default-timeout: 30000
  proxy-prefix: /gateway

# SDK config
app:
  sdk:
    output-dir: data/sdk
